
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - ginchat-network
    restart: unless-stopped
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
      kafka:
        condition: service_started
    environment:
        #TODO 你的角色:你的数据库密码，这里出于隐私安全，我不会暴露我的密码
      - MYSQL_DSN=your_role:your_password@tcp(Mysql:3306)/go_chat?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_ADDR=redis:6379
      - KAFKA_BROKER=kafka:9092
    volumes:
        #TODO 目前用户上传的图片会存储在后端项目static文件夹中，后续扩展可考虑MinIO 对象存储
      - ./static/upload:/root/static/upload
    networks:
      - ginchat-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      #TODO 输入数据库密码，注意这里数据库角色默认是root
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: go_chat

    volumes:
      - mysql-data:/var/lib/mysql
      - ./initSql:/docker-entrypoint-initdb.d
    networks:
      - ginchat-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine

    volumes:
      - redis-data:/data
    networks:
      - ginchat-network
    command: redis-server --appendonly yes
    restart: unless-stopped

  zookeeper:
    image: wurstmeister/zookeeper
    ports:
      - "2181:2181"
    networks:
      - ginchat-network
    restart: unless-stopped

  kafka:
    image: wurstmeister/kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092  # 供容器内服务访问
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      - zookeeper
    networks:
      - ginchat-network
    restart: unless-stopped
volumes:
  mysql-data:
  redis-data:
  kafka-data:

networks:
  ginchat-network:
    driver: bridge
