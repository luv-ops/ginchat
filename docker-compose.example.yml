
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - app
    networks:
      - ginchat-network
    restart: unless-stopped
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - MYSQL_DSN=root:your_password@tcp(Mysql:3306)/go_chat?charset=utf8mb4&parseTime=True&loc=Local
      - REDIS_ADDR=redis:6379
    volumes:
      - ./static/upload:/root/static/upload
    networks:
      - ginchat-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: your_password
      MYSQL_DATABASE: go_chat

    volumes:
      - Mysql-data:/var/lib/Mysql
      - ./Autowired.Mysql:/docker-entrypoint-initdb.d/Autowired.Mysql
    networks:
      - ginchat-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine

    volumes:
      - redis-data:/data
    networks:
      - ginchat-network
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  ginchat-network:
    driver: bridge
